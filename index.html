<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="Calendário moderno com semanas ISO e feriados nacionais do Brasil.">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icone-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icone-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendário WosVIP">
  <title>Calendário WosVIP</title>

  <style>
    :root{
      color-scheme: dark;
      --bg:#315b93;
      --surface:#07111f;
      --surface-2:#0d1b2d;
      --card:#f5ecd8;
      --primary:#0b67c2;
      --primary-strong:#074c91;
      --primary-soft:#d9eaff;
      --accent:#ffbd24;
      --text:#f7fbff;
      --text-dark:#0d243f;
      --muted:#9bb1c8;
      --border:#233b55;
      --danger:#e53935;
      --saturday:#ff6d21;
      --holiday:#ffe0e0;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      min-height:100%;
      background:var(--bg);
    }

    body{
      min-height:100vh;
      min-height:100dvh;
      margin:0;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(88px, calc(env(safe-area-inset-bottom) + 72px))
        max(10px, env(safe-area-inset-left));
      overflow-x:hidden;
      overflow-y:auto;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.12), transparent 35%),
        linear-gradient(160deg, #426fa9 0%, #315b93 52%, #274b7b 100%);
      color:var(--text);
    }

    button, select{
      font:inherit;
    }

    .app{
      width:min(100%, 560px);
      margin:0 auto 18px;
      background:linear-gradient(180deg, #07111f 0%, #03070d 100%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:18px 18px 12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:11px;
      min-width:0;
    }

    .brand-icon{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      border-radius:13px;
      background:linear-gradient(145deg, #36a3ff, #7b61ff);
      box-shadow:0 8px 20px rgba(36,134,255,.3);
      font-size:23px;
    }

    .brand-text h1{
      margin:0;
      font-size:clamp(21px, 5vw, 27px);
      line-height:1.1;
      letter-spacing:-.5px;
    }

    .brand-text p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:12px;
    }

    .today-button{
      border:1px solid rgba(255,255,255,.14);
      background:#10233a;
      color:white;
      min-height:42px;
      padding:0 14px;
      border-radius:13px;
      font-weight:800;
      cursor:pointer;
    }

    .today-button:active{
      transform:scale(.97);
    }

    .controls{
      margin:4px 14px 14px;
      padding:10px;
      display:grid;
      grid-template-columns:44px minmax(0,1fr) minmax(92px,.65fr) 44px;
      gap:8px;
      align-items:center;
      background:var(--card);
      border-radius:17px;
      color:var(--text-dark);
    }

    .nav-button{
      width:44px;
      height:44px;
      border:0;
      border-radius:13px;
      background:#fff;
      color:var(--primary-strong);
      font-size:25px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }

    .nav-button:active{
      transform:scale(.95);
    }

    .field{
      position:relative;
      min-width:0;
    }

    .field label{
      display:block;
      margin:0 0 2px 3px;
      color:#607086;
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.7px;
    }

    .field select{
      width:100%;
      height:36px;
      padding:0 26px 0 3px;
      border:0;
      outline:0;
      background:transparent;
      color:var(--primary-strong);
      font-size:16px;
      font-weight:900;
      appearance:none;
      cursor:pointer;
      text-overflow:ellipsis;
    }

    .field::after{
      content:"⌄";
      position:absolute;
      right:3px;
      bottom:7px;
      color:var(--primary-strong);
      font-weight:900;
      pointer-events:none;
    }

    .calendar-shell{
      margin:0 14px;
      overflow:hidden;
      border:1px solid #24384e;
      border-radius:18px;
      background:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:white;
      color:#111;
    }

    th{
      height:42px;
      padding:4px 1px;
      border-right:1px solid rgba(255,255,255,.14);
      background:var(--primary-strong);
      color:white;
      font-size:13px;
      font-weight:900;
    }

    th:last-child{
      border-right:0;
    }

    th.week-col{
      width:48px;
    }

    th.sunday{
      color:#ff3232;
      background:#f7f9fc;
    }

    th.saturday{
      color:var(--saturday);
      background:#f7f9fc;
    }

    td{
      position:relative;
      height:58px;
      padding:0;
      border-right:1px solid #c9ced4;
      border-top:1px solid #c9ced4;
      background:#fff;
      text-align:center;
      vertical-align:middle;
      font-size:15px;
      user-select:none;
    }

    td:last-child{
      border-right:0;
    }

    .week-number{
      background:#eef1f5;
      color:var(--primary-strong);
      font-weight:900;
      font-size:13px;
    }

    .day{
      cursor:pointer;
      transition:background .15s ease, transform .15s ease;
    }

    .day:active{
      transform:scale(.94);
    }

    .day.other-month{
      color:#a8b0ba;
      background:#f6f7f9;
    }

    .day.sunday{
      color:var(--danger);
      font-weight:800;
    }

    .day.saturday{
      color:var(--saturday);
      font-weight:800;
    }

    .day.holiday{
      background:var(--holiday);
      color:#b40000;
      font-weight:900;
    }

    .day.today{
      isolation:isolate;
      color:#111;
      font-weight:1000;
      background:#ffe06a;
      box-shadow:inset 0 0 0 3px #ff9d00;
    }

    .day.selected:not(.today){
      background:#d8eaff;
      box-shadow:inset 0 0 0 3px var(--primary);
      font-weight:900;
    }

    tr.current-week td{
      border-top:3px solid var(--primary);
      border-bottom:3px solid var(--primary);
    }

    tr.current-week .week-number{
      background:var(--primary);
      color:white;
    }

    .holiday-dot{
      position:absolute;
      left:50%;
      bottom:7px;
      width:5px;
      height:5px;
      margin-left:-2.5px;
      border-radius:50%;
      background:currentColor;
    }

    .selected-info{
      min-height:48px;
      margin:12px 14px 0;
      padding:11px 13px;
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      background:#0c1a2b;
      color:#dce9f7;
      font-size:13px;
    }

    .selected-info strong{
      color:white;
    }

    .developer{
      margin:13px 14px;
      text-align:center;
      font-size:13px;
      font-weight:800;
      letter-spacing:.35px;
    }

    .developer strong{
      color:#ffd329;
    }

    .holidays-card{
      margin:0 14px 24px;
      padding:17px;
      border-radius:20px;
      border-left:6px solid var(--primary);
      background:var(--card);
      color:var(--text-dark);
      box-shadow:0 8px 24px rgba(0,0,0,.12);
    }

    .holidays-card h2{
      margin:0;
      color:var(--primary-strong);
      font-size:21px;
    }

    .holiday-subtitle{
      margin:3px 0 12px;
      color:#66758a;
      font-size:12px;
    }

    .holidays-card ul{
      margin:0;
      padding-left:20px;
    }

    .holidays-card li{
      margin:8px 0;
      line-height:1.35;
      font-size:14px;
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:8px 12px;
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid rgba(0,0,0,.12);
      color:#536579;
      font-size:11px;
      font-weight:700;
    }

    .legend span{
      display:flex;
      align-items:center;
      gap:5px;
    }

    .legend i{
      width:9px;
      height:9px;
      border-radius:3px;
      display:inline-block;
    }

    .legend .today-key{ background:#ffe06a; border:1px solid #ff9d00; }
    .legend .holiday-key{ background:#ffd3d3; border:1px solid #e99; }
    .legend .week-key{ background:var(--primary); }

    @media (max-width:390px){
      body{ padding:6px; }
      .app{ border-radius:20px; }
      .topbar{ padding:15px 13px 10px; }
      .brand-icon{ width:38px; height:38px; }
      .today-button{ padding:0 10px; font-size:13px; }
      .controls,
      .calendar-shell,
      .selected-info,
      .holidays-card{ margin-left:9px; margin-right:9px; }
      .controls{ grid-template-columns:39px minmax(0,1fr) minmax(78px,.58fr) 39px; }
      .nav-button{ width:39px; height:42px; }
      th.week-col{ width:41px; }
      th{ font-size:12px; }
      td{ height:51px; font-size:14px; }
    }

    @media (min-width:700px){
      td{ height:66px; font-size:16px; }
    }

    @media (max-height:700px){
      body{
        padding-bottom:max(100px, calc(env(safe-area-inset-bottom) + 84px));
      }

      .holidays-card{
        margin-bottom:32px;
      }
    }

  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">📅</div>
        <div class="brand-text">
          <h1>Calendário</h1>
          <p>Semanas ISO e feriados do Brasil</p>
        </div>
      </div>
      <button id="btnHoje" class="today-button" type="button">Hoje</button>
    </header>

    <section class="controls" aria-label="Seleção do calendário">
      <button id="mesAnterior" class="nav-button" type="button" aria-label="Mês anterior">‹</button>

      <div class="field">
        <label for="mes">Mês</label>
        <select id="mes" aria-label="Selecionar mês"></select>
      </div>

      <div class="field">
        <label for="ano">Ano</label>
        <select id="ano" aria-label="Selecionar ano"></select>
      </div>

      <button id="mesSeguinte" class="nav-button" type="button" aria-label="Próximo mês">›</button>
    </section>

    <section class="calendar-shell">
      <table aria-label="Calendário mensal">
        <thead>
          <tr>
            <th class="week-col">Sem</th>
            <th class="sunday">Dom</th>
            <th>Seg</th>
            <th>Ter</th>
            <th>Qua</th>
            <th>Qui</th>
            <th>Sex</th>
            <th class="saturday">Sáb</th>
          </tr>
        </thead>
        <tbody id="calendario"></tbody>
      </table>
    </section>

    <div id="dataSelecionada" class="selected-info" aria-live="polite">
      Toque em um dia para ver os detalhes.
    </div>

    <div class="developer">
      Desenvolvido por: <strong>WosVIP®</strong>
    </div>

    <section class="holidays-card">
      <h2>Feriados do mês</h2>
      <p class="holiday-subtitle">Lista nacional. Feriados estaduais e municipais podem ser adicionados.</p>
      <ul id="listaFeriados"></ul>

      <div class="legend" aria-label="Legenda">
        <span><i class="today-key"></i> Hoje</span>
        <span><i class="holiday-key"></i> Feriado</span>
        <span><i class="week-key"></i> Semana atual</span>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    const meses = [
      "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
      "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
    ];

    const nomesDias = [
      "domingo","segunda-feira","terça-feira","quarta-feira",
      "quinta-feira","sexta-feira","sábado"
    ];

    const hoje = zerarHora(new Date());
    let dataSelecionada = null;

    const selectMes = document.getElementById("mes");
    const selectAno = document.getElementById("ano");
    const calendario = document.getElementById("calendario");
    const listaFeriados = document.getElementById("listaFeriados");
    const infoSelecionada = document.getElementById("dataSelecionada");

    function zerarHora(data){
      return new Date(data.getFullYear(), data.getMonth(), data.getDate());
    }

    function mesmaData(a, b){
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function chaveData(data){
      return [
        data.getFullYear(),
        String(data.getMonth() + 1).padStart(2, "0"),
        String(data.getDate()).padStart(2, "0")
      ].join("-");
    }

    function adicionarDias(data, dias){
      const nova = new Date(data);
      nova.setDate(nova.getDate() + dias);
      return zerarHora(nova);
    }

    // Semana ISO 8601: começa na segunda-feira e a semana 1 contém a primeira quinta-feira do ano.
    function numeroSemanaISO(data){
      const d = new Date(Date.UTC(data.getFullYear(), data.getMonth(), data.getDate()));
      const dia = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dia);
      const inicioAno = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - inicioAno) / 86400000) + 1) / 7);
    }

    function inicioSemanaDomingo(data){
      return adicionarDias(data, -data.getDay());
    }

    function calcularPascoa(ano){
      const a = ano % 19;
      const b = Math.floor(ano / 100);
      const c = ano % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const mes = Math.floor((h + l - 7 * m + 114) / 31);
      const dia = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(ano, mes - 1, dia);
    }

    function feriadosAno(ano){
      const pascoa = calcularPascoa(ano);

      return [
        { data:new Date(ano, 0, 1), nome:"Confraternização Universal", tipo:"nacional" },
        { data:adicionarDias(pascoa, -48), nome:"Carnaval (segunda-feira)", tipo:"ponto facultativo" },
        { data:adicionarDias(pascoa, -47), nome:"Carnaval (terça-feira)", tipo:"ponto facultativo" },
        { data:adicionarDias(pascoa, -2), nome:"Paixão de Cristo", tipo:"data observada" },
        { data:pascoa, nome:"Páscoa", tipo:"data comemorativa" },
        { data:new Date(ano, 3, 21), nome:"Tiradentes", tipo:"nacional" },
        { data:new Date(ano, 4, 1), nome:"Dia Mundial do Trabalho", tipo:"nacional" },
        { data:adicionarDias(pascoa, 60), nome:"Corpus Christi", tipo:"ponto facultativo/local" },
        { data:new Date(ano, 8, 7), nome:"Independência do Brasil", tipo:"nacional" },
        { data:new Date(ano, 9, 12), nome:"Nossa Senhora Aparecida", tipo:"nacional" },
        { data:new Date(ano, 10, 2), nome:"Finados", tipo:"nacional" },
        { data:new Date(ano, 10, 15), nome:"Proclamação da República", tipo:"nacional" },
        { data:new Date(ano, 10, 20), nome:"Dia Nacional de Zumbi e da Consciência Negra", tipo:"nacional" },
        { data:new Date(ano, 11, 25), nome:"Natal", tipo:"nacional" }
      ].map(item => ({ ...item, data:zerarHora(item.data) }));
    }

    function preencherSeletores(){
      meses.forEach((mes, indice) => {
        const option = document.createElement("option");
        option.value = indice;
        option.textContent = mes;
        selectMes.appendChild(option);
      });

      const anoAtual = hoje.getFullYear();
      for(let ano = anoAtual - 50; ano <= anoAtual + 50; ano++){
        const option = document.createElement("option");
        option.value = ano;
        option.textContent = ano;
        selectAno.appendChild(option);
      }

      selectMes.value = hoje.getMonth();
      selectAno.value = hoje.getFullYear();
    }

    function atualizarInfoSelecionada(data, feriado){
      const dataFormatada = new Intl.DateTimeFormat("pt-BR", {
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
      }).format(data);

      const textoFeriado = feriado
        ? ` • ${feriado.nome} (${feriado.tipo})`
        : "";

      infoSelecionada.innerHTML =
        `<span aria-hidden="true">📌</span><div><strong>${dataFormatada}</strong>${textoFeriado}</div>`;
    }

    function gerarCalendario(){
      calendario.innerHTML = "";
      listaFeriados.innerHTML = "";

      const mes = Number(selectMes.value);
      const ano = Number(selectAno.value);
      const primeiroDoMes = new Date(ano, mes, 1);
      const inicioGrade = inicioSemanaDomingo(primeiroDoMes);
      const feriados = feriadosAno(ano);
      const mapaFeriados = new Map(feriados.map(f => [chaveData(f.data), f]));
      const inicioSemanaAtual = inicioSemanaDomingo(hoje);

      // Exibe sempre 6 linhas, evitando mudança brusca de altura entre os meses.
      for(let semana = 0; semana < 6; semana++){
        const linha = document.createElement("tr");
        const primeiroDiaLinha = adicionarDias(inicioGrade, semana * 7);
        const linhaAtual = mesmaData(primeiroDiaLinha, inicioSemanaAtual);

        if(linhaAtual){
          linha.classList.add("current-week");
        }

        const celulaSemana = document.createElement("td");
        celulaSemana.className = "week-number";
        // Usa a segunda-feira da linha para determinar a semana ISO.
        celulaSemana.textContent = numeroSemanaISO(adicionarDias(primeiroDiaLinha, 1));
        linha.appendChild(celulaSemana);

        for(let coluna = 0; coluna < 7; coluna++){
          const data = adicionarDias(primeiroDiaLinha, coluna);
          const celula = document.createElement("td");
          const feriado = mapaFeriados.get(chaveData(data));

          celula.classList.add("day");
          celula.textContent = data.getDate();
          celula.dataset.date = chaveData(data);
          celula.setAttribute("role", "button");
          celula.setAttribute("tabindex", "0");
          celula.setAttribute("aria-label",
            `${data.getDate()} de ${meses[data.getMonth()]} de ${data.getFullYear()}`
            + (feriado ? `, ${feriado.nome}` : "")
          );

          if(data.getMonth() !== mes){
            celula.classList.add("other-month");
          }
          if(data.getDay() === 0){
            celula.classList.add("sunday");
          }
          if(data.getDay() === 6){
            celula.classList.add("saturday");
          }
          if(feriado){
            celula.classList.add("holiday");
            const ponto = document.createElement("span");
            ponto.className = "holiday-dot";
            ponto.setAttribute("aria-hidden", "true");
            celula.appendChild(ponto);
          }
          if(mesmaData(data, hoje)){
            celula.classList.add("today");
          }
          if(dataSelecionada && mesmaData(data, dataSelecionada)){
            celula.classList.add("selected");
          }

          const selecionar = () => {
            if(dataSelecionada && mesmaData(dataSelecionada, data)){
              dataSelecionada = null;
            }else{
              dataSelecionada = data;
            }
            gerarCalendario();
          };

          celula.addEventListener("click", selecionar);
          celula.addEventListener("keydown", event => {
            if(event.key === "Enter" || event.key === " "){
              event.preventDefault();
              selecionar();
            }
          });

          linha.appendChild(celula);
        }

        calendario.appendChild(linha);
      }

      const feriadosMes = feriados
        .filter(f => f.data.getMonth() === mes)
        .sort((a,b) => a.data - b.data);

      if(feriadosMes.length === 0){
        const li = document.createElement("li");
        li.textContent = "Não há datas nacionais cadastradas neste mês.";
        listaFeriados.appendChild(li);
      }else{
        feriadosMes.forEach(feriado => {
          const li = document.createElement("li");
          li.innerHTML =
            `<strong>${String(feriado.data.getDate()).padStart(2,"0")}/${String(mes + 1).padStart(2,"0")}</strong>`
            + ` — ${feriado.nome}`
            + `<br><small>${feriado.tipo}</small>`;
          listaFeriados.appendChild(li);
        });
      }

      if(dataSelecionada){
        const feriadoSelecionado = mapaFeriados.get(chaveData(dataSelecionada));
        atualizarInfoSelecionada(dataSelecionada, feriadoSelecionado);
      }else{
        infoSelecionada.innerHTML =
          '<span aria-hidden="true">📌</span><div>Toque em um dia para ver os detalhes.</div>';
      }
    }

    function mudarMes(delta){
      const data = new Date(Number(selectAno.value), Number(selectMes.value) + delta, 1);
      selectMes.value = data.getMonth();
      selectAno.value = data.getFullYear();
      dataSelecionada = null;
      gerarCalendario();
    }

    selectMes.addEventListener("change", () => {
      dataSelecionada = null;
      gerarCalendario();
    });

    selectAno.addEventListener("change", () => {
      dataSelecionada = null;
      gerarCalendario();
    });

    document.getElementById("mesAnterior").addEventListener("click", () => mudarMes(-1));
    document.getElementById("mesSeguinte").addEventListener("click", () => mudarMes(1));

    document.getElementById("btnHoje").addEventListener("click", () => {
      selectMes.value = hoje.getMonth();
      selectAno.value = hoje.getFullYear();
      dataSelecionada = new Date(hoje);
      gerarCalendario();
    });


    document.querySelector(".app").addEventListener("click", event => {
      const clicouEmDia = event.target.closest(".day");
      const clicouEmControle = event.target.closest("button, select");

      if(!clicouEmDia && !clicouEmControle && dataSelecionada){
        dataSelecionada = null;
        gerarCalendario();
      }
    });

    // Navegação por gesto no smartphone.
    let toqueInicialX = null;

    document.querySelector(".calendar-shell").addEventListener("touchstart", event => {
      toqueInicialX = event.changedTouches[0].clientX;
    }, { passive:true });

    document.querySelector(".calendar-shell").addEventListener("touchend", event => {
      if(toqueInicialX === null) return;
      const diferenca = event.changedTouches[0].clientX - toqueInicialX;

      if(Math.abs(diferenca) > 55){
        mudarMes(diferenca < 0 ? 1 : -1);
      }
      toqueInicialX = null;
    }, { passive:true });

    preencherSeletores();
    gerarCalendario();

    if("serviceWorker" in navigator){
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          // O calendário continua funcionando normalmente sem o service worker.
        });
      });
    }
  </script>
</body>
</html>
